{% extends "base.html" %}
{% load static %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/signup.css' %}">

<div class="signup-container">
    <div class="signup-card">

        <h2>Create Your StreamFare Account</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">
                Create Account
            </button>
        </form>
    </div>
</div>

{% endblock %}
