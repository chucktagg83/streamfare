{% extends "base.html" %}

{% load static %}

{% block title %}Login{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class='login-container'>
  <div class='login-card'>

  <h2>Login</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit">Login</button>
    </form>
  </div>
</div>
{% endblock content%}
