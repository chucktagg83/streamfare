{% extends "base.html" %}
{% load static %}

{% block title %}
    {{ video_object.title }}
{% endblock %}

{% block content %}

<main class="main-container">
    <div class="movie-screen">

        <h1>{{ video_object.title }}</h1>

        {% if video_object.media_path %}
            <video
                width="100%"
                height="100vh"
                controls
                preload="metadata"
            >
                <source
                    src="{% url 'pages:stream-movie' pk=video_object.pk %}"
                    type="video/mp4"
                >

                Your browser does not support the video tag.
            </video>
        {% else %}
            <p>
                No NAS movie file has been connected to
                {{ video_object.title }}.
            </p>
        {% endif %}

    </div>
</main>

{% endblock %}
